<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinançaMay | Dashboard de Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <main class="max-w-6xl mx-auto p-6 space-y-8">
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">FinançaMay</h1>
                <p class="text-slate-500">Gestão de Fluxo de Caixa</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-semibold text-slate-400 uppercase">Saldo Consolidado</p>
                <div id="saldo-total" class="text-3xl font-extrabold text-blue-600">R$ 0,00</div>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <form id="form-financa" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                <h2 class="font-bold text-lg mb-4">Nova Entrada/Saída</h2>
                <input type="text" id="descricao" placeholder="Descrição" required class="w-full p-3 border rounded-lg">
                <input type="number" id="valor" step="0.01" placeholder="Valor (R$)" required class="w-full p-3 border rounded-lg">
                <select id="tipo" class="w-full p-3 border rounded-lg">
                    <option value="entrada">Receita</option>
                    <option value="saida">Despesa</option>
                </select>
                <input type="date" id="data" required class="w-full p-3 border rounded-lg">
                <button type="submit" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700 transition">Registrar</button>
            </form>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 md:col-span-2">
                <canvas id="graficoEconomia"></canvas>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <table class="w-full text-left">
                <thead><tr class="text-slate-400 text-sm uppercase">
                    <th class="p-3">Data</th><th class="p-3">Descrição</th><th class="p-3">Tipo</th><th class="p-3 text-right">Valor</th><th class="p-3"></th>
                </tr></thead>
                <tbody id="lista-transacoes"></tbody>
            </table>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>

                        </select>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Data</label>
                        <input type="date" id="data" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition">Salvar</button>
                </form>
            </div>

            <!-- Gráficos e Dashboard -->
            <div class="bg-white p-6 rounded-xl shadow-md md:col-span-2 flex flex-col justify-center">
                <h2 class="text-xl font-semibold mb-4">Economia (Entradas vs Saídas)</h2>
                <canvas id="graficoEconomia"></canvas>
            </div>
        </div>

        <!-- Lista de Transações Recentes -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-semibold mb-4">Histórico</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b bg-gray-50">
                            <th class="p-3">Data</th>
                            <th class="p-3">Descrição</th>
                            <th class="p-3">Tipo</th>
                            <th class="p-3">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="lista-transacoes">
                        <!-- Linhas geradas via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- Importação do script -->
    <script type="module" src="app.js"></script>
</body>
</html>
