<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinançaMay - Dashboard</title>
    <!-- TailwindCSS para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para os gráficos de economia -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-5xl mx-auto space-y-6">
        <!-- Cabeçalho -->
        <header class="bg-blue-600 text-white p-6 rounded-xl shadow-md flex justify-between items-center">
            <h1 class="text-2xl font-bold">Dashboard FinançaMay</h1>
            <div class="text-lg">Saldo Atual: <span id="saldo-total" class="font-bold text-green-300">R$ 0,00</span></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Formulário para adicionar finanças -->
            <div class="bg-white p-6 rounded-xl shadow-md md:col-span-1">
                <h2 class="text-xl font-semibold mb-4">Nova Transação</h2>
                <form id="form-financa" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Descrição</label>
                        <input type="text" id="descricao" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tipo</label>
                        <select id="tipo" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                            <option value="entrada">Entrada (Receita)</option>
                            <option value="saida">Saída (Despesa)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Data</label>
                        <input type="date" id="data" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition">Salvar</button>
                </form>
            </div>

            <!-- Gráficos e Dashboard -->
            <div class="bg-white p-6 rounded-xl shadow-md md:col-span-2 flex flex-col justify-center">
                <h2 class="text-xl font-semibold mb-4">Economia (Entradas vs Saídas)</h2>
                <canvas id="graficoEconomia"></canvas>
            </div>
        </div>

        <!-- Lista de Transações Recentes -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-semibold mb-4">Histórico</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b bg-gray-50">
                            <th class="p-3">Data</th>
                            <th class="p-3">Descrição</th>
                            <th class="p-3">Tipo</th>
                            <th class="p-3">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="lista-transacoes">
                        <!-- Linhas geradas via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- Importação do script -->
    <script type="module" src="app.js"></script>
</body>
</html>
